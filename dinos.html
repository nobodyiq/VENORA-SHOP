<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>قسم الديناصورات</title>
    <style>
        body { font-family: sans-serif; background-color: #111; color: white; text-align: center; padding: 20px; }
        .back-btn { display: inline-block; color: #ffcc00; text-decoration: none; margin-bottom: 20px; font-weight: bold; }
        .product-card { background-color: #222; border: 1px solid #333; border-radius: 8px; padding: 15px; margin: 15px auto; max-width: 280px; }
        .price { color: #00ffcc; font-size: 1.2rem; font-weight: bold; margin: 10px 0; }
        .buy-btn { display: inline-block; background-color: #25d366; color: white; padding: 10px 20px; border-radius: 5px; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>

    <a href="index.html" class="back-btn">⬅️ العودة للرئيسية</a>

        <!-- غيّر الرقم 964000000000 إلى رقم الواتساب الخاص بك مع مقدمة بلدك -->

        <!-- غيّر الرقم 964000000000 إلى رقم الواتساب الخاص بك مع مقدمة بلدك -->

    </div>

</body>
</html>
